{{ define "main" }}
<article>
  <header style="margin-bottom: 2rem;">
    <h1 style="margin: 0 0 0.5rem;">{{ .Title }}</h1>
    <div style="color: var(--muted); font-size: 0.9rem;">
      {{ .Date.Format "2006" }}
      {{ with .Params.tech }} · {{ delimit . ", " }}{{ end }}
      {{ with .Params.tags }} · {{ delimit . ", " }}{{ end }}
    </div>
    {{ with .Params.link }}
      <div style="margin-top: 0.5rem;">
        <a href="{{ . }}" target="_blank" rel="noopener">View Project →</a>
      </div>
    {{ end }}
  </header>

  <div class="content">
    {{ .Content }}
  </div>

  <div style="margin-top: 3rem; padding-top: 1rem; border-top: 1px solid var(--border);">
    <a href="/projects">← Back to Projects</a>
  </div>
</article>
{{ end }}
